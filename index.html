<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBC Analytics Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #6EE7B7; }
        * { box-sizing: border-box; }
        body {
            font-family: 'IBM Plex Sans', system-ui, sans-serif;
            background: #0D1117;
            color: #F9FAFB;
            margin: 0;
            padding: 0;
        }
        .header {
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: rgba(13,17,23,0.95);
            backdrop-filter: blur(16px);
        }
        .kpi-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .kpi-card:hover { transform: translateY(-3px); }
        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #6EE7B7, #3B82F6);
        }
        .glass-panel {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 20px;
            backdrop-filter: blur(16px);
            overflow-x: auto;
        }
        .number {
            font-family: 'Space Mono', monospace;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.03em;
        }
        .crm-button {
            background: rgba(139, 92, 246, 0.15);
            padding: 6px 10px;
            border-radius: 30px;
            color: #A78BFA;
            border: 1px solid rgba(139, 92, 246, 0.3);
            font-size: 0.7rem;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }
        .crm-button:hover { background: #8B5CF6; color: white; }
        .composition-btn {
            background: rgba(245, 158, 11, 0.15);
            padding: 6px 10px;
            border-radius: 30px;
            color: #FBBF24;
            border: 1px solid rgba(245, 158, 11, 0.3);
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .composition-btn:hover { background: #F59E0B; color: white; }
        table { min-width: 700px; }
        @media (max-width: 640px) {
            table { min-width: 600px; }
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        #loader {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(13,17,23,0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #6EE7B7;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .large-order { color: #6EE7B7 !important; font-weight: 700; }
        
        /* Telegram блок */
        .telegram-alert {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 12px 14px;
            transition: all 0.3s;
            animation: fadeInUp 0.3s ease;
        }
        .telegram-alert.new {
            background: rgba(110,231,183,0.08);
            border-color: rgba(110,231,183,0.3);
        }
    </style>
</head>
<body class="p-4 md:p-6">
    <div id="loader"><div class="loader-spinner"></div></div>
    <div class="max-w-7xl mx-auto">
        
        <header class="header px-6 py-5 mb-8 rounded-3xl flex items-center justify-between sticky top-4 z-50 shadow-2xl">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-[#6EE7B7] to-[#3B82F6] flex items-center justify-center text-2xl shadow-inner">📊</div>
                <div>
                    <div class="text-2xl font-semibold tracking-[-0.02em]">GBC Analytics</div>
                    <div class="text-xs text-slate-400 font-medium">Supabase • RetailCRM • Live</div>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="loadData()" class="flex items-center gap-2 px-6 py-3 bg-white/10 hover:bg-white/20 rounded-3xl text-white font-medium transition-all">
                    <i class="fas fa-sync-alt"></i>
                    <span>Обновить</span>
                </button>
                <div class="flex items-center gap-2 bg-white/5 rounded-3xl px-4 py-1">
                    <div class="w-3 h-3 rounded-full bg-emerald-400 animate-pulse"></div>
                    <span class="text-emerald-400 text-sm font-medium">Live</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="kpi-card"><div class="flex justify-between items-start"><div><div class="text-slate-400 text-xs font-medium tracking-widest">ВЫРУЧКА</div><div id="total-revenue" class="number text-white mt-1">—</div></div><div class="text-4xl">💰</div></div></div>
            <div class="kpi-card"><div class="flex justify-between items-start"><div><div class="text-slate-400 text-xs font-medium tracking-widest">ЗАКАЗОВ</div><div id="total-orders" class="number text-white mt-1">—</div></div><div class="text-4xl">🛒</div></div></div>
            <div class="kpi-card"><div class="flex justify-between items-start"><div><div class="text-slate-400 text-xs font-medium tracking-widest">СРЕДНИЙ ЧЕК</div><div id="avg-order" class="number text-white mt-1">—</div></div><div class="text-4xl">📈</div></div></div>
            <div class="kpi-card"><div class="flex justify-between items-start"><div><div class="text-slate-400 text-xs font-medium tracking-widest">КРУПНЫХ ≥50К</div><div id="large-orders" class="number text-[#6EE7B7] mt-1">—</div></div><div class="text-4xl">⚡</div></div></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-8">
            <!-- Выручка по часам -->
            <div class="glass-panel p-6 lg:col-span-2">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold">Выручка по часам</h2>
                    <span class="text-xs px-3 py-1 bg-white/10 rounded-3xl text-slate-400">сегодня</span>
                </div>
                <div class="h-64"><canvas id="hourly-chart"></canvas></div>
            </div>
            
            <!-- Telegram блок -->
            <div class="glass-panel p-6 flex flex-col">
                <div class="flex items-center gap-2 mb-4">
                    <i class="fab fa-telegram text-[#6EE7B7]"></i>
                    <h2 class="text-lg font-semibold">Крупные заказы</h2>
                    <span id="telegram-count" class="ml-auto bg-amber-400 text-black text-xs font-bold px-3 py-1 rounded-3xl">0</span>
                </div>
                <div id="telegram-alerts" class="flex-1 space-y-2 overflow-y-auto pr-1 max-h-64"></div>
            </div>
        </div>

        <!-- Выручка по городам -->
        <div class="glass-panel p-6 mb-8">
            <h2 class="text-lg font-semibold mb-4">Выручка по городам</h2>
            <div class="h-64"><canvas id="city-chart"></canvas></div>
        </div>

        <!-- Таблица заказов -->
        <div class="glass-panel p-6">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">Заказы<span id="orders-count" class="text-xs bg-white/10 px-3 py-1 rounded-3xl text-slate-400">0</span></h2>
            <table class="min-w-full text-sm">
                <thead class="text-slate-400 text-xs uppercase border-b border-slate-700">
                    <tr><th class="py-3 text-left">№</th><th class="py-3 text-left">Клиент</th><th class="py-3 text-left">Город</th><th class="py-3 text-right">Сумма</th><th class="py-3 text-center">Состав</th><th class="py-3 text-center">CRM</th></tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-slate-800"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        const SUPABASE_URL = 'https://zpsosnvqyamhswgvsdwq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_tPscwc04xcb9ky5lvkMhJA_eahPbl7A';
        const CRM_BASE = 'https://nazarnazarov399.retailcrm.ru';

        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let allOrders = [];
        let hourlyChart = null;
        let cityChart = null;
        const loader = document.getElementById('loader');
        let autoUpdateInterval = null;
        let previousLargeOrderIds = new Set();

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
        }

        function normalizeOrder(o) {
            return {
                ...o,
                total: o.total_sum ?? o.total_summ ?? 0
            };
        }

        function showLoader(show) {
            if (!loader) return;
            loader.style.display = show ? 'flex' : 'none';
        }

        async function loadData() {
            showLoader(true);
            try {
                const { data, error } = await supabase.from('orders').select('*').order('id', { ascending: false }).limit(500);
                if (error) {
                    console.error(error);
                    alert('Ошибка загрузки данных');
                    return;
                }
                allOrders = (data || []).map(normalizeOrder);
                console.log('Загружено заказов:', allOrders.length);
                updateMetrics();
                renderHourlyChart();
                renderCityChart();
                renderTelegramAlerts();
                renderTable();
            } catch (e) {
                console.error(e);
                alert('Ошибка загрузки данных');
            } finally {
                showLoader(false);
            }
        }

        function updateMetrics() {
            const total = allOrders.reduce((s, o) => s + o.total, 0);
            const large = allOrders.filter(o => o.total >= 50000).length;
            const avg = allOrders.length ? total / allOrders.length : 0;

            document.getElementById('total-revenue').textContent = total.toLocaleString('ru-KZ') + ' ₸';
            document.getElementById('total-orders').textContent = allOrders.length;
            document.getElementById('avg-order').textContent = Math.round(avg).toLocaleString('ru-KZ') + ' ₸';
            document.getElementById('large-orders').textContent = large;
            document.getElementById('orders-count').textContent = allOrders.length;
        }

        function renderHourlyChart() {
            const ctx = document.getElementById('hourly-chart').getContext('2d');
            if (hourlyChart) hourlyChart.destroy();
            if (allOrders.length === 0) return;

            const hourly = new Array(24).fill(0);
            allOrders.forEach(o => {
                const dateField = o.created_at || o.order_date;
                if (!dateField) return;
                const d = new Date(dateField);
                if (isNaN(d)) return;
                const hour = d.getHours();
                hourly[hour] += o.total;
            });

            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(110, 231, 183, 0.4)');
            gradient.addColorStop(1, 'rgba(110, 231, 183, 0)');

            hourlyChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length:24}, (_,i) => `${i}:00`),
                    datasets: [{
                        label: 'Выручка',
                        data: hourly,
                        borderColor: '#6EE7B7',
                        backgroundColor: gradient,
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        pointRadius: 0,
                        pointHoverRadius: 7
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.08)' }, ticks: { color: '#6B7280', callback: v => v.toLocaleString('ru-KZ') + ' ₸' } },
                        x: { grid: { color: 'rgba(255,255,255,0.06)' }, ticks: { color: '#6B7280' } }
                    }
                }
            });
        }

        function renderCityChart() {
            const ctx = document.getElementById('city-chart').getContext('2d');
            if (cityChart) cityChart.destroy();
            if (allOrders.length === 0) return;

            const cityMap = {};
            allOrders.forEach(o => {
                const city = o.city || 'Другое';
                cityMap[city] = (cityMap[city] || 0) + o.total;
            });

            const sorted = Object.entries(cityMap).sort((a,b) => b[1] - a[1]).slice(0,7);
            const colors = ['#6EE7B7','#3B82F6','#F59E0B','#EC4899','#8B5CF6','#10B981','#FBBF24'];

            cityChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sorted.map(([city]) => city),
                    datasets: [{
                        data: sorted.map(([,sum]) => sum),
                        backgroundColor: colors,
                        borderRadius: 10,
                        barThickness: 32
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { color: 'rgba(255,255,255,0.08)' }, ticks: { color: '#6B7280', callback: v => v.toLocaleString('ru-KZ') + ' ₸' } },
                        y: { grid: { display: false }, ticks: { color: '#9CA3AF' } }
                    }
                }
            });
        }

        function renderTelegramAlerts() {
            const largeOrders = allOrders
                .filter(o => o.total >= 50000)
                .sort((a, b) => new Date(b.created_at || b.order_date) - new Date(a.created_at || a.order_date))
                .slice(0, 5);
            
            const currentLargeIds = new Set(largeOrders.map(o => o.id));
            
            // Проверяем новые крупные заказы (для анимации)
            const newOrders = largeOrders.filter(o => !previousLargeOrderIds.has(o.id));
            previousLargeOrderIds = currentLargeIds;
            
            document.getElementById('telegram-count').textContent = largeOrders.length;
            
            const container = document.getElementById('telegram-alerts');
            container.innerHTML = largeOrders.map((order, index) => {
                const date = order.created_at || order.order_date;
                const time = date ? new Date(date).toLocaleString('ru-RU', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'}) : '—';
                const safeCrmId = encodeURIComponent(order.crm_id || order.number || order.id);
                const isNew = newOrders.some(o => o.id === order.id);
                
                return `
                    <div class="telegram-alert ${isNew ? 'new' : ''}">
                        <div style="display:flex;align-items:center;gap:10px;">
                            <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#6EE7B7,#3B82F6);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">🔔</div>
                            <div style="flex:1;min-width:0;">
                                <div style="color:#F9FAFB;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(order.customer_name) || 'Клиент'}</div>
                                <div style="color:#9CA3AF;font-size:11px;">${escapeHtml(order.city) || '—'} • ${time}</div>
                            </div>
                            <div style="color:#6EE7B7;font-size:14px;font-weight:700;font-family:'Space Mono',monospace;">${order.total.toLocaleString('ru-KZ')} ₸</div>
                        </div>
                        <div style="margin-top:8px;text-align:right;">
                            <a href="${CRM_BASE}/orders/${safeCrmId}/edit" target="_blank" style="color:#A78BFA;font-size:11px;text-decoration:none;">
                                <i class="fas fa-external-link-alt"></i> Открыть в CRM
                            </a>
                        </div>
                    </div>
                `;
            }).join('');
            
            if (largeOrders.length === 0) {
                container.innerHTML = '<div class="text-slate-500 text-sm text-center py-4">Нет крупных заказов</div>';
            }
        }

        function toggleComposition(orderId) {
            const detailsRow = document.getElementById(`details-${orderId}`);
            if (detailsRow) detailsRow.classList.toggle('hidden');
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            
            tbody.innerHTML = allOrders.slice(0, 20).map(order => {
                const items = Array.isArray(order.items) ? order.items : [];
                let itemsText = '—';
                if (items.length > 0) {
                    itemsText = items.map(i => {
                        const name = i.name || 'Товар';
                        const qty = i.quantity || 1;
                        return escapeHtml(name) + ' × ' + qty;
                    }).join(', ');
                }
                const crmId = order.crm_id || order.number || order.id;
                const safeCrmId = encodeURIComponent(crmId);
                const isLarge = order.total >= 50000;
                
                return `
                    <tr>
                        <td class="py-3 text-white">${escapeHtml(order.number) || order.id}</td>
                        <td class="py-3 text-slate-300">${escapeHtml(order.customer_name) || '—'}</td>
                        <td class="py-3 text-slate-400">${escapeHtml(order.city) || '—'}</td>
                        <td class="py-3 text-right font-bold ${isLarge ? 'large-order' : 'text-white'}">${order.total.toLocaleString('ru-KZ')} ₸</td>
                        <td class="py-3 text-center">
                                                        <button onclick="toggleComposition(${order.id})" class="composition-btn">
                                <i class="fas fa-list-ul"></i> Состав
                            </button>
                        </td>
                        <td class="py-3 text-center">
                            <a href="${CRM_BASE}/orders/${safeCrmId}/edit" target="_blank" class="crm-button">
                                <i class="fas fa-external-link-alt"></i> CRM
                            </a>
                        </td>
                    </tr>
                    <tr class="hidden bg-slate-800/30" id="details-${order.id}">
                        <td colspan="6" class="p-4 text-slate-300">
                            <strong class="text-[#6EE7B7]">Состав заказа:</strong>
                            <div class="mt-2">${itemsText}</div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function startAutoUpdate() {
            if (autoUpdateInterval) clearInterval(autoUpdateInterval);
            autoUpdateInterval = setInterval(loadData, 30000);
        }

        function stopAutoUpdate() {
            if (autoUpdateInterval) {
                clearInterval(autoUpdateInterval);
                autoUpdateInterval = null;
            }
        }

        window.toggleComposition = toggleComposition;
        window.loadData = loadData;
        
        loadData();
        startAutoUpdate();
        
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                stopAutoUpdate();
            } else {
                loadData();
                startAutoUpdate();
            }
        });
    </script>
</body>
</html>
